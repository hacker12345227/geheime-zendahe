<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Achterhuus</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="onair">🔴 ON AIR</div>
  <div class="nowplaying">
    Nu draait: <span id="track">Laden...</span>
  </div>
</div>

<!-- HEADER -->
<header>
  <img src="logo.png" alt="Radio Achterhuus Logo" />
  <h1>Radio Achterhuus</h1>
</header>

<!-- NAV -->
<nav>
  <a href="#home">Home</a>
  <a href="#live">Live</a>
  <a href="#request">Verzoek</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <h2>De Achterhoekse Piratenzender</h2>
  <p>24/7 underground radio uit de schuur</p>
</section>

<!-- LIVE -->
<section class="section" id="live">
  <div class="card">
    <h2>🔊 Live Stream</h2>
    <p>Luister direct naar Radio Achterhuus</p>

    <audio controls>
      <source src="https://stream-url-hier.nl/stream" type="audio/mpeg">
      Jouw browser ondersteunt audio niet.
    </audio>

    <a class="button" href="#">▶ Open speler</a>
  </div>
</section>

<!-- REQUEST -->
<section class="section" id="request">
  <div class="card">
    <h2>📨 Verzoekplaatje</h2>
    <p>Stuur jouw track in voor de uitzending</p>

    <form onsubmit="sendRequest(event)">
      <input type="text" id="name" placeholder="Jouw naam" required />
      <input type="text" id="song" placeholder="Artiest - Nummer" required />
      <button type="submit">Versturen</button>
    </form>

    <p id="msg"></p>
  </div>
</section>

<!-- JS -->
<script src="script.js"></script>

<!-- REQUEST SCRIPT (simpel houden hier) -->
<script>
function sendRequest(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const song = document.getElementById("song").value;

  document.getElementById("msg").innerText =
    "Bedankt " + name + "! Je verzoek (" + song + ") is ontvangen.";

  document.getElementById("name").value = "";
  document.getElementById("song").value = "";
}
</script>

</body>
</html>
