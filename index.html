<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Achterhuus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="onair">🔴 ON AIR</div>
  <div class="nowplaying">
    Nu draait: <span id="track">Radio Achterhuus Live</span>
  </div>
</div>

<!-- HEADER -->
<header>
  <img src="logo.png" alt="Radio Achterhuus Logo" />
  <h1>Radio Achterhuus</h1>
</header>

<!-- NAV -->
<nav>
  <a href="#home">Home</a>
  <a href="#live">Live</a>
  <a href="#request">Verzoek</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <h2>Welkom bij Radio Achterhuus</h2>
  <p>De beste piraten vibes 24/7 in de ether</p>
</section>

<!-- LIVE STREAM -->
<section class="section" id="live">
  <div class="card">
    <h2>🔊 Live Stream</h2>
    <p>Luister direct naar onze zender</p>

    <audio controls autoplay>
      <source src="https://stream-url-hier.nl/stream" type="audio/mpeg">
      Jouw browser ondersteunt audio niet.
    </audio>

    <br /><br />

    <a class="button" href="#">▶ Fullscreen Player</a>
  </div>
</section>

<!-- REQUEST -->
<section class="section" id="request">
  <div class="card">
    <h2>📨 Verzoekplaatje</h2>
    <p>Stuur je verzoek in voor de uitzending</p>

    <form onsubmit="sendRequest(event)">
      <input type="text" id="name" placeholder="Jouw naam" required />
      <input type="text" id="song" placeholder="Artiest - Nummer" required />
      <button type="submit">Versturen</button>
    </form>

    <p id="msg"></p>
  </div>
</section>

<!-- SCRIPT -->
<script>
function sendRequest(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const song = document.getElementById('song').value;

  document.getElementById('msg').innerText =
    "Bedankt " + name + ", je verzoek ('" + song + "') is ontvangen!";

  document.getElementById('name').value = '';
  document.getElementById('song').value = '';
}

// NOW PLAYING SIMULATIE
const tracks = [
  "DJ Achterhoek - Nacht in de Schuur",
  "Piraten Hitmix 2026",
  "Live Vinyl Session",
  "Achterhuus Classics"
];

setInterval(() => {
  const random = tracks[Math.floor(Math.random() * tracks.length)];
  document.getElementById('track').innerText = random;
}, 8000);
</script>

</body>
</html>
